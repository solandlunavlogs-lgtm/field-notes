backend:
  name: github
  repo: solandlunavlogs-lgtm/field-notes
  branch: main

media_folder: "uploads"
public_folder: "uploads"

collections:
  - name: "posts"
    label: "Blog Posts"
    files:
      - name: "posts"
        label: "All Posts"
        file: "posts.json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{title}} — {{date}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "string", hint: "Write it however you like, e.g. July 13, 2026" }
              - { label: "Cover image (optional)", name: "image", widget: "image", required: false, hint: "Shows at the top of the post" }
              - { label: "Post text", name: "body", widget: "markdown", hint: "Use the image button in the toolbar to add photos anywhere in the post" }
