<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Notes</title>
<meta name="description" content="A personal journal of life updates.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,500;1,9..144,600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

<header class="site-header">
  <p class="eyebrow">a personal journal</p>
  <h1 class="site-title">Field Notes</h1>
  <p class="site-tagline">Life, logged as it happens.</p>
</header>

<main id="entries" class="entries">
  <!-- posts are rendered here by script.js -->
</main>

<footer class="site-footer">
  <p>Written and kept by hand.</p>
</footer>

<script src="script.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
</body>
</html>
